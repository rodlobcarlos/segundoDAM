<nav class="navbar navbar-dark bg-success px-3">
  <a class="navbar-brand" href="/">CRUD Tareas</a>
  <ul class="navbar-nav ms-auto flex-row gap-3">
    <li class="nav-item"><a class="nav-link text-white" routerLink="/tareas">Tareas</a></li>
    <li class="nav-item"><a class="nav-link text-white" routerLink="/usuarios">Usuarios</a></li>
  </ul>
</nav>

<div class="container">
  <div class="row">
    <div class="col-md-8 mt-4">
      <ul class="list-group">
        <li
          *ngFor="let tarea of tareas"
          class="list-group-item list-group-item-action"
          (click)="abrirParaEditar(tarea)"
        >
          <span class="badge bg-success text-white">{{tarea.id}}</span>
          {{tarea.titulo}} - {{tarea.descripcion}} - {{tarea.estado}}
        </li>
      </ul>
      <div class="card mt-4">
        <div class="card-body">
          <div class="card-title">Insertar nueva Tarea</div>
          <div class="form-group">
            <input type="text" [(ngModel)]="tareaSeleccionada.titulo" placeholder="Introduce un título" class="form-control">
          </div>
          <div class="form-group mt-2">
            <input type="text" [(ngModel)]="tareaSeleccionada.descripcion" placeholder="Introduce una descripción" class="form-control">
          </div>
          <div class="form-group mt-2">
            <input type="text" [(ngModel)]="tareaSeleccionada.estado" placeholder="Introduce un estado" class="form-control">
          </div>
          <button (click)="agregarOEditar()" class="btn btn-success">Guardar</button>
          <button (click)="eliminar()" class="btn btn-danger">Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>
